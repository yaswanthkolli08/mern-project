<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Password Strength Checker</h1>
    <p>Create a strong and secure password.</p>

    <div class="input-box">
        <input type="password" id="password" placeholder="Enter your password">
        <button id="toggleBtn">Show</button>
    </div>

    <div class="strength-bar">
        <div id="bar"></div>
    </div>

    <h3 id="strengthText">Password Strength</h3>

    <div class="rules">
        <p id="length">❌ Minimum 8 characters</p>
        <p id="upper">❌ One uppercase letter</p>
        <p id="lower">❌ One lowercase letter</p>
        <p id="number">❌ One number</p>
        <p id="special">❌ One special character</p>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
